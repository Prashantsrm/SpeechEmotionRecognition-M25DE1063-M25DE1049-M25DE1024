version: "3.9"

services:
  api:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./models:/app/models      # mount trained model
      - ./results:/app/results    # mount results output
    environment:
      - MODEL_PATH=models/ensemble_best.pth
      - PORT=5000
    restart: unless-stopped

  # Serve the frontend on port 8080 (static file server)
  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    restart: unless-stopped
